services:
  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      user-service: 
        condition: service_started
      chat-service: 
        condition: service_started
      notification-service: 
        condition: service_started
    #restart: always
    volumes:
      - ./services/mail:/app/api-gateway
      - /app/node_modules
      - /app/dist
      - ./proto:/app/proto
    networks:
      - app-network
  user-service:
    container_name: user-service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4006:4001"
    #restart: always
    volumes:
      - ./services/user:/app
      - /app/node_modules
      - /app/dist
      - ./proto:/app/proto
    env_file:
      - ./services/user/.env
    depends_on:
      - cache-service
    networks:
      - app-network
  notification-service:
    container_name: notification-service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4007:4002"
    env_file:
      - ./services/notification/.env
    #restart: always
    volumes:
      - ./services/mail:/app/services/notification
      - /app/node_modules
      - /app/dist
      - ./proto:/app/proto
    networks:
      - app-network
  chat-service:
    container_name: chat-service
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    ports:
      - "4008:4003"
    env_file:
      - ./services/chat/.env
    #restart: always
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
      - ./proto:/app/proto
    networks:
      - app-network
  cache-service: 
    container_name: cache-service
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./services/cache/.env
    volumes:
      - ./services/mail:/app/services/cache
      - /app/node_modules
      - /app/dist
      - ./proto:/app/proto
    ports:
      - "50051:50051"
    networks:
      - app-network
  mail-service: 
    container_name: mail-service
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./services/mail/.env
    volumes:
      - ./services/mail:/app/services/mail
      - /app/node_modules
      - /app/dist
      - ./proto:/app/proto
    networks:
      - app-network
  redis:
    image: redis:7.4.2
    container_name: redis
    restart: always
    env_file:
      - ./environments/redis/.env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "6379:6379"
    networks:
      - app-network
  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    image: rediscommander/redis-commander:latest
    build: .
    restart: always
    env_file:
      - ./environments/redis/commander/.env
    ports:
    - 8082:8081
    networks:
      - app-network
  postgres_db:
    image: postgres:17.2
    container_name: postgres_db
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready","-U","root"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./environments/postgres/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres.sql:/docker-entrypoint-initdb.d/postgres.sql
      - /app/dist
    networks:
      - app-network
  pg_admin:
    image: dpage/pgadmin4
    container_name: pg_admin
    restart: always
    env_file:
      - ./environments/postgres/admin/.env
    ports:
      - "5050:80"
    depends_on:
      postgres_db: 
        condition: service_healthy
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
   postgres_data:


